# Production Database Configuration
# Uncomment for MySQL production
# spring.datasource.url=jdbc:mysql://your-db-host:3306/reverse_platform
# spring.datasource.username=your-db-user
# spring.datasource.password=your-db-password
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Development H2 Configuration (comment out for production)
spring.datasource.url=jdbc:h2:mem:reverse_platform
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server Configuration
server.port=8080

# Production CORS Configuration
# Update with your actual frontend URL in production
spring.web.cors.allowed-origins=https://yourdomain.com,https://www.yourdomain.com
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Production Security
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true

# Actuator Configuration for Health Checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# Application Info
info.app.name=Reverse Interview Platform
info.app.version=1.0.0
info.app.description=Platform for reverse interview process
