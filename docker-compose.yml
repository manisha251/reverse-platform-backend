version: '3.8'

services:
  reverse-platform:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:reverse_platform
      - SPRING_JPA_HIBERNATE_DDL_AUTO=create-drop
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Optional: H2 Database Console (for development)
  h2-console:
    image: oscarfonts/h2:latest
    ports:
      - "8181:8082"
    environment:
      - H2_OPTIONS=-webAllowOthers -tcpAllowOthers
    volumes:
      - h2-data:/opt/h2-data
    depends_on:
      - reverse-platform
    profiles:
      - dev

volumes:
  h2-data: